# Reconstructed from live container metadata observed on 2026-03-29.
# Reference only.
# This file is not directly runnable because several original bind-mounted
# host files are already missing from G:\金融量化工程.

services:
  freqtrade:
    image: ghcr.io/freqtrade/freqtrade:stable
    container_name: freqtrade
    restart: unless-stopped
    ports:
      - "127.0.0.1:18888:8080"
    volumes:
      - "G:\\金融量化工程\\user_data:/freqtrade/user_data:rw"
    command:
      - trade
      - --logfile
      - /freqtrade/user_data/logs/freqtrade.log
      - --db-url
      - sqlite:////freqtrade/user_data/tradesv3.sqlite
      - --config
      - /freqtrade/user_data/config.json
      - --strategy
      - SampleStrategy
    environment:
      HTTP_PROXY: http://192.168.31.99:7890
      HTTPS_PROXY: http://192.168.31.99:7890
      NO_PROXY: localhost,127.0.0.1,*.local,192.168.31.99

  freqtrade-mode-api:
    image: python:3.13-alpine
    container_name: freqtrade-mode-api
    restart: unless-stopped
    working_dir: /app
    command: ["python", "/app/server.py"]
    volumes:
      - "G:\\金融量化工程\\docker-compose.yml:/workspace/docker-compose.yml:ro"
      - "G:\\金融量化工程\\manage_api:/app:ro"
      - "G:\\金融量化工程\\user_data:/workspace/user_data:rw"
    environment:
      LISTEN_HOST: 0.0.0.0
      LISTEN_PORT: "8090"
      CONFIG_PATH: /workspace/user_data/config.json
      FT_API_BASE: http://freqtrade:8080/api/v1
      COMPOSE_PATH: /workspace/docker-compose.yml
      LIVE_CONFIRM_PHRASE: LIVE
      HTTP_PROXY: http://127.0.0.1:7890
      HTTPS_PROXY: http://127.0.0.1:7890
      NO_PROXY: localhost,127.0.0.1,freqtrade,freqtrade-cn-ui,freqtrade-mode-api

  freqtrade-cn-ui:
    image: nginx:1.27-alpine
    container_name: freqtrade-cn-ui
    restart: unless-stopped
    depends_on:
      - freqtrade-mode-api
    ports:
      - "127.0.0.1:8899:80"
    volumes:
      - "G:\\金融量化工程\\ui:/usr/share/nginx/html:ro"
      - "G:\\金融量化工程\\ui\\nginx.conf:/etc/nginx/conf.d/default.conf:ro"
    environment:
      HTTP_PROXY: http://192.168.31.99:7890
      HTTPS_PROXY: http://192.168.31.99:7890
      NO_PROXY: localhost,127.0.0.1,*.local,192.168.31.99

networks:
  default:
    name: freqtrade-cn_default
